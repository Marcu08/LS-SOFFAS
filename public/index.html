<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a56db">
  <meta name="description" content="Gestionale LS SOFFASS - WMS per gestione bolle e giacenze">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <title>Gestionale LS SOFFASS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <p>Caricamento in corso...</p>
  </div>
  <div id="app"></div>

  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/js/app.js?v=8"></script>
  <script src="/js/auth.js?v=7"></script>
  <script src="/js/dashboard.js?v=7"></script>
  <script src="/js/ingresso.js?v=7"></script>
  <script src="/js/giacenze.js?v=7"></script>
  <script src="/js/movimenti.js?v=7"></script>
  <script src="/js/export.js?v=14"></script>
  <script src="/js/uploadWizard.js?v=8"></script>
  <script src="/js/importGiacenze.js?v=2"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(console.warn);
    }
    document.addEventListener("DOMContentLoaded", () => App.init());
  </script>
</body>
</html>
